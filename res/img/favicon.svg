<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo oscuro (slate-900) con bordes redondeados tipo app -->
  <rect width="100" height="100" rx="22" fill="#0f172a" />
  
  <!-- Borde sutil (slate-800) -->
  <rect width="96" height="96" x="2" y="2" rx="20" fill="none" stroke="#1e293b" stroke-width="2" />
  
  <!-- Letras "mf" con fuente monoespaciada y colores de la marca -->
  <text x="49" y="53" 
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" 
        font-size="58" 
        font-weight="bold" 
        letter-spacing="-3" 
        text-anchor="middle" 
        dominant-baseline="central">
    <tspan fill="#34d399">m</tspan><tspan fill="#94a3b8">f</tspan>
  </text>
</svg>
